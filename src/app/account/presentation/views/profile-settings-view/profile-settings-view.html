<div class="page">

  <main class="content">

    <section class="container">

      <div class="success-alert" *ngIf="showSuccessMessage">
        <div>
          <strong>✅ Perfil actualizado correctamente</strong>
          <p>Los cambios se guardaron exitosamente.</p>
        </div>
        <button (click)="closeSuccessMessage()">×</button>
      </div>

      <div class="error-alert" *ngIf="storeError()">
        <div>
          <strong>❌ Error al guardar</strong>
          <p>{{ storeError() }}</p>
        </div>
      </div>

      <section class="card personal-card">
        <h3>Información personal</h3>
        <p>Actualiza tus datos personales.</p>

        <div class="personal-grid">
          <div class="photo-section">
            <div class="avatar-large">{{ avatarInitials }}</div>
            <button type="button">Cambiar foto</button>
            <small>JPG, PNG. Máx 2MB</small>
          </div>

          <div class="form-grid">
            <label>
              Nombres
              <input [(ngModel)]="firstName" />
            </label>

            <label>
              Apellidos
              <input [(ngModel)]="lastName" />
            </label>

            <label>
              Teléfono
              <input [(ngModel)]="phone" />
            </label>

            <label>
              Correo electrónico
              <input [(ngModel)]="email" type="email" />
            </label>

            <label>
              Fecha de nacimiento
              <input [(ngModel)]="birthDate" type="date" />
            </label>

            <label>
              Género
              <select [(ngModel)]="gender">
                <option value="">Seleccionar</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Otro">Otro</option>
              </select>
            </label>
          </div>
        </div>
      </section>

      <section class="card">
        <h3>Seguridad</h3>
        <p>Gestiona tu contraseña.</p>

        <div class="security-row">
          <div class="password-box">
            <strong>Contraseña</strong>
            <span>************</span>
          </div>

          <button class="outline-button" type="button">🔒 Cambiar contraseña</button>
        </div>
      </section>

      <div class="actions">
        <button class="cancel" type="button" (click)="cancel()">Cancelar</button>
        <button
          class="save"
          type="button"
          (click)="saveChanges()"
          [disabled]="loading()"
        >
          {{ loading() ? 'Guardando...' : '💾 Guardar cambios' }}
        </button>
      </div>

    </section>
  </main>
</div>
